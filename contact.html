<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./images/4406745.webp" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
    integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Tailwind</title>
</head>

<body>

  <header class="flex flex-col md:flex-row items-center justify-between p-4 gap-4 md:gap-0 w-full max-w-7xl mx-auto">

    <div>
      <img src="./images/4406745.webp" class="h-16 md:h-24" alt="">
    </div>

    <nav class="flex flex-row flex-wrap items-center justify-center gap-2 text-center w-full md:w-auto">
      <span><a href="./index.html"
          class="rounded-md px-3 py-2 hover:scale-110 hover:bg-black hover:text-white transition-all duration-500 font-medium">Home</a></span>
      <span><a href="./about.html"
          class="rounded-md px-3 py-2 hover:scale-110 hover:bg-black hover:text-white transition-all duration-500 font-medium">About</a></span>
      <span><a href="./feature.html"
          class="rounded-md px-3 py-2 hover:scale-110 hover:bg-black hover:text-white transition-all duration-500 font-medium">Features</a></span>
      <span><a href="#"
          class="rounded-md px-3 py-2 hover:scale-110 hover:bg-black hover:text-white transition-all duration-500 font-medium">Contact
          Us</a></span>
    </nav>

    <div class="flex flex-row items-center justify-center gap-2 text-center w-full md:w-auto">
      <span><a href="./signup.html"
          class="hover:scale-110 capitalize hover:bg-black hover:text-white transition-all duration-500 rounded-md px-3 py-2 font-medium">Sign
          up</a></span>
      <span><a href="./signin.html" class="hover:scale-110 capitalize hover:bg-black hover:text-white transition-all duration-500 rounded-md px-3 py-2 font-medium">sign
          in</a></span>
    </div>

  </header>

  <form class="my-16 w-full max-w-6xl mx-auto px-4 flex flex-col lg:flex-row items-center lg:items-start justify-center gap-10">

    <div class="flex flex-col items-center justify-center w-full lg:w-1/2 mt-4">

      <label for="Name" class="w-full">
        <input type="text" required value="" placeholder="Enter Your Name"
          class="border-b-1 w-full mb-8 outline-none border-b-gray-200 hover:border-b-black focus:border-b-black p-2">
      </label>

      <label for="email" class="w-full">
        <input type="email" required value="" placeholder="Enter Your Email"
          class="border-b-1 w-full mb-8 outline-none border-b-gray-200 hover:border-b-black focus:border-b-black p-2">
      </label>

      <label for="password" class="w-full">
        <input type="password" required value="" placeholder="Enter Your Password"
          class="border-b-1 w-full mb-8 outline-none border-b-gray-200 hover:border-b-black focus:border-b-black p-2">
      </label>

      <textarea name="text" placeholder="Enter Your Feedback and Problem" class="border-1 border-gray-200 outline-none hover:border-black focus:border-black p-2 mb-8 w-full rounded-md" id="" cols="30" rows="6"></textarea>

      <div class="flex gap-4 w-full justify-center lg:justify-start">
        <button type="submit" class="capitalize rounded-md p-2 border-1 w-24 hover:scale-110 hover:bg-black hover:text-white transition-all duration-500">submit</button>
        <button type="reset" class="capitalize rounded-md p-2 border-1 w-24 hover:scale-110 hover:bg-black hover:text-white transition-all duration-500">reset</button>
      </div>
      
    </div>

    <div class="w-full lg:w-1/2">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d924237.7098362652!2d66.49594966940124!3d25.192983639780632!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33e06651d4bbf%3A0x9cf92f44555a0c23!2sKarachi%2C%20Pakistan!5e0!3m2!1sen!2s!4v1749548736826!5m2!1sen!2s"
        class="w-full h-80 lg:h-[450px] border-0 rounded-lg shadow-md" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

  </form>

   <footer class="w-full p-6 md:p-10 border-t mt-8">

       <h4 class="text-2xl text-center transition-all duration-500 font-bold text-black mb-4">About Us</h4>
       <p class="text-center text-gray-600 text-lg max-w-3xl mx-auto">Lorem ipsum dolor sit amet consectetur adipisicing elit. Odit tempora tempore perspiciatis? 
        Tenetur inventore odit cumque maxime at deserunt modi,
        architecto commodi quos debitis!</p>

       <div class="flex flex-row items-center justify-center m-6 gap-6">
        <i class="fa-brands fa-facebook fa-xl text-blue-600 hover:scale-110 cursor-pointer transition-all"></i>
        <i class="fa-brands fa-instagram fa-xl text-orange-600 hover:scale-110 cursor-pointer transition-all"></i>
        <i class="fa-brands fa-twitter fa-xl text-blue-400 hover:scale-110 cursor-pointer transition-all"></i>
        <i class="fa-brands fa-linkedin fa-xl text-blue-600 hover:scale-110 cursor-pointer transition-all"></i>
       </div>

       <p class="text-center text-gray-600 text-lg m-4 capitalize">Made With <i class="fa-solid fa-heart fa text-red-600 mx-1"></i> by fast Performance</p>

     </footer>
     
</body>

</html>
